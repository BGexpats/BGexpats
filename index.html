<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>BGexpats — Everything Expats Need to Live Well in Bulgaria</title>
    <meta name="description" content="Visas, healthcare, banking, housing and more — all in plain English. Plus an AI assistant available 24/7 for expats and tourists in Bulgaria." />

    <!-- PWA manifest: tells the phone the app name, colours and icons -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e5e3f" />

    <!-- Standard favicons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Apple / iPhone: Safari ignores the manifest, so it needs these -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BGexpats" />

    <!-- Social sharing preview -->
    <meta property="og:title" content="BGexpats — Life in Bulgaria, in Plain English" />
    <meta property="og:description" content="Visas, healthcare, banking, housing and more. Plus an AI assistant available 24/7." />
    <meta property="og:image" content="https://bgexpats.com/icons/icon-512.png" />
    <meta property="og:url" content="https://bgexpats.com/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
